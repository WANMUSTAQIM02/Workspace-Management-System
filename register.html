<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Pro | Register</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; overflow: hidden; background-color: #050505;">
    
    <canvas id="bg-canvas" style="position: absolute; top: 0; left: 0; z-index: -1;"></canvas>

    <div class="container relative" style="z-index: 1;">
        <div class="row justify-content-center gsap-element">
            <div class="col-md-5 col-11">
                <div class="glass-panel p-5 text-center shadow-lg">
                    <h2 class="fw-bold mb-4 text-white"><i class="fas fa-user-plus text-primary me-2"></i>Create Account</h2>
                    
                    <form onsubmit="window.daftarAkaunBaru(event)" class="text-start">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Email Address</label>
                            <input type="email" id="reg-email" class="form-control bg-dark text-white border-secondary" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Password</label>
                            <input type="password" id="reg-password" class="form-control bg-dark text-white border-secondary" placeholder="Min 6 characters" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-bold">Confirm Password</label>
                            <input type="password" id="reg-confirm-password" class="form-control bg-dark text-white border-secondary" placeholder="Re-enter password" required>
                        </div>

                        <button type="submit" id="reg-btn" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Register Account</button>
                    </form>

                    <div class="mt-4 small text-secondary">
                        Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Login here</a>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- CUSTOM POPUP MODAL (PENGESAHAN EMAIL) -->
    <div class="modal fade" id="emailAlertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-panel border-0 text-center p-4">
                <div class="modal-body">
                    <div class="mb-3">
                        <i class="fas fa-envelope-open-text text-primary" style="font-size: 3.5rem;"></i>
                    </div>
                    <h4 class="fw-bold text-white mb-3">Check Your Inbox</h4>
                    <p class="text-secondary mb-4">
                        A verification link has been sent to your email.<br><br>
                        <span class="text-warning fw-bold"><i class="fas fa-exclamation-triangle me-1"></i> IMPORTANT:</span><br>
                        If the email goes to your <strong>SPAM</strong> folder, you MUST click <strong>"Report Not Spam"</strong> first to make the link clickable.
                    </p>
                    <button type="button" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" data-bs-dismiss="modal">I Understand</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="register-script.js"></script>
</body>
</html>
