    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workspace Pro">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Pro | Profile Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>

    <nav class="navbar navbar-expand-lg glass-nav fixed-top py-3" id="main-ui">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html"><i class="fas fa-terminal text-primary me-2"></i>Workspace Pro</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars text-white"></i></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3 align-items-lg-center mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="money-management.html"><i class="fas fa-wallet me-1"></i> Money Mgmt</a></li>
                    <li class="nav-item"><a class="nav-link" href="history-reports.html"><i class="fas fa-history me-1"></i> History</a></li>
                    <li class="nav-item"><a class="nav-link" href="idea-board.html"><i class="fas fa-lightbulb me-1"></i> Ideas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile-settings.html"><i class="fas fa-user-cog me-1"></i> Profile</a></li>
                    <li class="nav-item mt-2 mt-lg-0"><button class="btn btn-outline-danger btn-sm fw-bold w-100" onclick="window.logKeluarSistem()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 50px;">
        <div class="row justify-content-center gsap-element">
            <div class="col-lg-8">
                <div class="glass-panel p-5">
                    <div class="tilt-card-content">
                        
                        <!-- PROFILE & SALARY -->
                        <div class="d-flex align-items-center gap-3 mb-4 border-bottom border-secondary pb-3">
                            <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle fs-3"><i class="fas fa-user-sliders"></i></div>
                            <div><h3 class="fw-bold mb-0">Profile & Salary Settings</h3><p class="text-secondary small mb-0">Configure your credentials & salary metrics.</p></div>
                        </div>
                        <form id="profile-settings-form" onsubmit="window.kemaskiniProfilCloud(event)">
                            <div class="row g-4 mb-4">
                                <div class="col-md-6"><label class="form-label text-secondary small fw-bold">Full Employee Name</label><input type="text" id="profile-name" class="form-control bg-dark text-white border-secondary" required></div>
                                <div class="col-md-6"><label class="form-label text-secondary small fw-bold">Display Nick Name</label><input type="text" id="profile-nickname" class="form-control bg-dark text-white border-secondary" required></div>
                                <div class="col-md-6"><label class="form-label text-secondary small fw-bold">Basic Salary (RM)</label><input type="number" id="profile-salary" class="form-control bg-dark text-white border-secondary" step="0.01" required></div>
                                <div class="col-md-6"><label class="form-label text-secondary small fw-bold">Staff ID</label><input type="text" id="profile-staff-id" class="form-control bg-dark text-white border-secondary"></div>
                                <div class="col-12"><label class="form-label text-secondary small fw-bold">Bound Firebase Auth Email</label><input type="text" id="profile-email-display" class="form-control bg-dark text-secondary border-secondary" readonly></div>
                            </div>
                            <div class="text-end"><button type="submit" class="btn btn-primary px-4 fw-bold"><i class="fas fa-save me-2"></i>Save Modifications</button></div>
                        </form>

                        <!-- SECURITY SETTINGS -->
                        <hr class="border-secondary opacity-50 my-5">
                        <div class="d-flex align-items-center gap-3 mb-4 border-bottom border-secondary pb-3">
                            <div class="bg-warning bg-opacity-10 text-warning p-3 rounded-circle fs-3"><i class="fas fa-shield-alt"></i></div>
                            <div><h3 class="fw-bold mb-0">Security Settings</h3><p class="text-secondary small mb-0">Update your login credentials.</p></div>
                        </div>
                        <form id="change-email-form" onsubmit="window.tukarEmailAkaun(event)">
                            <div class="row g-4 mb-3">
                                <div class="col-md-8">
                                    <label class="form-label text-secondary small fw-bold">New Email Address</label>
                                    <input type="email" id="profile-new-email" class="form-control bg-dark text-white border-secondary" placeholder="Enter new email address" required>
                                </div>
                                <div class="col-md-4 d-flex align-items-end">
                                    <button type="submit" class="btn btn-outline-warning w-100 fw-bold"><i class="fas fa-envelope me-2"></i>Update Email</button>
                                </div>
                            </div>
                        </form>

                        <!-- LOGOUT ACTION (Added Here) -->
                        <hr class="border-secondary opacity-50 my-5">
                        <div class="d-grid">
                            <button type="button" class="btn btn-outline-danger btn-lg fw-bold" onclick="window.logKeluarSistem()">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout from System
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <div class="mobile-bottom-nav d-lg-none">
        <a href="index.html" class="nav-item-mobile"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="money-management.html" class="nav-item-mobile"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="idea-board.html" class="nav-item-center-wrapper"><div class="nav-item-center"><i class="fas fa-lightbulb"></i></div></a>
        <a href="history-reports.html" class="nav-item-mobile"><i class="fas fa-file-invoice-dollar"></i><span>Activity</span></a>
        <a href="profile-settings.html" class="nav-item-mobile active"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script type="module" src="profile-script.js"></script>
    <script src="anti-cache.js"></script>
</body>
</html>
