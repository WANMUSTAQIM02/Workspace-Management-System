<!DOCTYPE html>
<html lang="en">
<head>
    <!-- PWA & App Links -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workspace Pro">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Pro | Ideas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <nav class="navbar navbar-expand-lg glass-nav fixed-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html"><i class="fas fa-terminal text-primary me-2"></i>Workspace Pro</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars text-white"></i></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3 align-items-lg-center mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="money-management.html"><i class="fas fa-wallet me-1"></i> Money Mgmt</a></li>
                    <li class="nav-item"><a class="nav-link" href="history-reports.html"><i class="fas fa-history me-1"></i> History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="idea-board.html"><i class="fas fa-lightbulb me-1"></i> Ideas</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile-settings.html"><i class="fas fa-user-cog me-1"></i> Profile</a></li>
                    <li class="nav-item mt-2 mt-lg-0"><button class="btn btn-outline-danger btn-sm fw-bold w-100" onclick="window.logKeluarSistem()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 50px;">
        <div class="d-flex justify-content-between align-items-center mb-5 gsap-element">
            <h1 class="fw-bold">Community Idea Board</h1>
            <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#idea-modal">+</button>
        </div>
        <div class="row g-4" id="idea-container"></div>
    </div>

    <!-- Idea Modal (Untuk Tambah Idea) -->
    <div class="modal fade" id="idea-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-panel border-0 p-4">
                <h5 class="fw-bold mb-4">Post Your Idea</h5>
                <form id="idea-form" onsubmit="window.hantarIdea(event)">
                    <div class="mb-3"><input type="text" id="idea-title" class="form-control bg-dark text-white border-secondary" placeholder="Idea Title" required></div>
                    <div class="mb-4"><textarea id="idea-desc" class="form-control bg-dark text-white border-secondary" placeholder="Explain your idea..." required style="height:100px;"></textarea></div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Submit Idea</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal (UI Baru Ganti Default Browser) -->
    <div class="modal fade" id="delete-confirm-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-panel border-0">
                <div class="modal-body text-center p-4">
                    <i class="fas fa-exclamation-triangle text-warning fs-1 mb-3"></i>
                    <h5 class="fw-bold">Delete Idea?</h5>
                    <p class="text-secondary my-3">Are you sure you want to permanently delete this idea? This action cannot be undone.</p>
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" id="confirm-delete-btn" class="btn btn-danger px-4">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <div class="mobile-bottom-nav d-lg-none">
        <a href="index.html" class="nav-item-mobile"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="money-management.html" class="nav-item-mobile"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <!-- Tengah: Center Button (Aktif) -->
        <a href="idea-board.html" class="nav-item-center-wrapper"><div class="nav-item-center" style="box-shadow: 0 0 30px rgba(178, 36, 239, 0.8);"><i class="fas fa-lightbulb"></i></div></a>
        <a href="history-reports.html" class="nav-item-mobile"><i class="fas fa-file-invoice-dollar"></i><span>Activity</span></a>
        <a href="profile-settings.html" class="nav-item-mobile"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="idea-script.js"></script>
    <script src="anti-cache.js"></script>
</body>
</html>
