<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Workspace Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Three.js Background -->
    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4 gsap-element">
            
            <div class="glass-panel p-5 tilt-card" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.1">
                <div class="tilt-card-content text-center">
                    
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-4" style="width: 70px; height: 70px; font-size: 28px;">
                        <i class="fas fa-fingerprint"></i>
                    </div>
                    
                    <h2 class="fw-bold mb-1" id="auth-title">Welcome Back</h2>
                    <p class="text-secondary mb-4" id="auth-desc">Authenticate to access your secure workspace.</p>

                    <form id="auth-form" onsubmit="window.kendalikanAutentikasi(event)">
                        <div class="mb-3 text-start">
                            <label class="form-label text-secondary small fw-semibold">Email Address</label>
                            <input type="email" id="auth-email" class="form-control bg-dark text-white border-secondary" placeholder="name@company.com" required>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label text-secondary small fw-semibold">Password</label>
                            <input type="password" id="auth-password" class="form-control bg-dark text-white border-secondary" placeholder="••••••••" required>
                        </div>
                        <button type="submit" id="auth-submit-btn" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Initialize Session</button>
                    </form>

                    <div class="mt-4">
                        <span id="auth-toggle-text" onclick="window.toggleAuthMode()" class="text-primary small fw-semibold" style="cursor: pointer; transition: 0.2s;">
                            Don't have an account? Request Access
                        </span>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script type="module" src="script.js?v=4.0.0"></script>
</body>
</html>
